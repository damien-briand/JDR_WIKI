function loadUData(mid, uid, callback){
	var xobj = new XMLHttpRequest();
	xobj.overrideMimeType('application/json');
	xobj.open('GET', location.protocol + '//' + location.host + '/ws/map/completed/map/' + mid + '/' + currentSlot + '/user/' + uid + '?v='+ new Date().getTime(), true);
//	xobj.open('GET', location.protocol + '//' + location.host + '/map-custom-' + mid + '-' + uid + '-slot' + currentSlot + '.json?v='+ new Date().getTime(), true);
	xobj.onreadystatechange = function () {
		if (xobj.readyState == 4 && xobj.status == '200') {
			callback(xobj.responseText);
		} else if (xobj.readyState == 4 && xobj.status == '403') {
			callback(null);
		} else if (xobj.readyState == 4 && xobj.status == '404') {
			callback(null);
		} else if (xobj.readyState == 4 && xobj.status == '500') {
			callback(null);
		} else if (xobj.readyState == 4 && xobj.status == '502') {
			callback(null);
		}
	};
	xobj.send(null);
}

function loadSlotData(mid, uid, callback){
	var xobj = new XMLHttpRequest();
	xobj.overrideMimeType('application/json');
	xobj.open('GET', location.protocol + '//' + location.host + '/ws/map/completed-data/map/' + mid + '/' + currentSlot + '/user/' + uid + '?v='+ new Date().getTime(), true);
//	xobj.open('GET', location.protocol + '//' + location.host + '/map-custom-' + mid + '-data-' + uid + '-slot' + currentSlot + '.json?v='+ new Date().getTime(), true);
	xobj.onreadystatechange = function () {
		if (xobj.readyState == 4 && xobj.status == '200') {
			callback(xobj.responseText);
		} else if (xobj.readyState == 4 && xobj.status == '403') {
			callback(null);
		} else if (xobj.readyState == 4 && xobj.status == '404') {
			callback(null);
		} else if (xobj.readyState == 4 && xobj.status == '500') {
			callback(null);
		}
	};
	xobj.send(null);

function copyToClipboard(copyText) {

	});

function doSearch(category, type, text, fcompleted) {
	var control = $('#search-content');
	$.each($('.map-search-res-item'), function() {
		var id = $(this).attr('data');
		var vmarker = markers[id];
		map.removeLayer(vmarker);
	});
	$('#categoriesContent').hide();
	$('.map_sidebar_search_content').show();
	control.empty();
	$.each(categories, function() {
		$.each(vmarkers[this.id], function() {
			var vmarker = this;
			map.removeLayer(vmarker);
		});
	});

	$.each(items, function() {
		var queryCategory = (category == '' ? true : (category == this.category));
		var link = (this.pageLink != null ? this.pageLink : '/' + this.name.replace(/\s+/g, '+'));
		var showEntry = false;
		if (type == 'name') {
			var queryName = (text == '' ? true : this.name.toLowerCase().includes(text.toLowerCase()));
			if (queryCategory && queryName) {
				showEntry = true;
			}
		} else if (type == 'namedescription') {
			var queryName = (text == '' ? true : this.name.toLowerCase().includes(text.toLowerCase()) || (this.description != null && this.description.toLowerCase().includes(text.toLowerCase())));
			if (queryCategory && queryName) {
				showEntry = true;
			}
		} else if (type == 'description') {
			var queryName = (text == '' ? true : this.description != null && this.description.toLowerCase().includes(text.toLowerCase()));
			if (queryCategory && queryName) {
				showEntry = true;
			}
		}
		var isCompleted = (udata != null && udata[this.id.toString()] != null);
		if (showEntry && !(fcompleted == 'uncompleted' && isCompleted)) {
			control.append('<hr class="d4breakline"' + (isSearchResultCollapsed ? ' style="display:none;"' : '') + '><div class="sidebar2 map_sidebar_search_element map-search-res-item" ' + (isSearchResultCollapsed ? ' style="padding-top:unset;padding-bottom:unset;" ' : '') + ' data="' + this.id + '"><h5 class="sidebar2 map_sidebar_title"><div><img class="map_sidebar_search_result_image search-res-item" src="' + this.image + '" alt="' + this.name + '" /><label class="map_sidebar_search_result_title search-res-item" style="width: 21rem;">' + this.name + '</label><img class="link_icon" src="https://diablo4.wiki.fextralife.com/file/Diablo-4/external_link_icon.png" alt="Alina" data="' + (this.hasPageLink != null && this.hasPageLink && this.pageLink != null && this.pageLink != '' ? this.pageLink : '/' + this.name.replaceAll(" ", "+")) + '" style="margin-right: 0;vertical-align: bottom;"><button type="button" style="width: 30px;height: 30px;" class="another-map-search-res-item ' + (isCompleted ? 'map_search_element_completed_checkbox_checked' : 'map_search_element_completed_checkbox_unchecked') + '" title="Mark as completed."></button></div></h5><div class="sidebar2 map_sidebar_tags"' + (isSearchResultCollapsed ? ' style="display:none;"' : '') + '><span class="othertags">' + this.category + '</span>' + (isCompleted ? '<span class="clustertag">Completed</span>' : '') + '</div><div class="sidebar2 map_sidebar_description"' + (isSearchResultCollapsed ? ' style="display:none;"' : '') + '>' + (this.description != null ? this.description : '') + '</div></div>');
			var vmarker = markers[this.id];
			map.addLayer(vmarker);
		}
	});

	return false;
}

$('#searchCategorySelection').click(function() {
	var control = $(this);
	if (control.parent().hasClass('open')) {
		control.parent().removeClass('open');
	} else {
		control.parent().addClass('open');
	}
	return false;
});
$(document).off('keyup', '#searchCategorySelection');

});

var isSearchResultCollapsed = false;
$('#collapse').click(function() {
	if (isSearchResultCollapsed) {
		$('.map_sidebar_description').show();
		$('.map_sidebar_tags').show();
		$('.d4breakline').show();
		$('.map_sidebar_search_element').css('padding-top', '5px');
		$('.map_sidebar_search_element').css('padding-bottom', '5px');
		isSearchResultCollapsed = false;
		$(this).removeClass('map_search_list');
		$(this).addClass('map_sidebar_collapse');
	} else {
		$('.map_sidebar_description').hide();
		$('.map_sidebar_tags').hide();
		$('.d4breakline').hide();
		$('.map_sidebar_search_element').css('padding-top', 'unset');
		$('.map_sidebar_search_element').css('padding-bottom', 'unset');
		isSearchResultCollapsed = true;
		$(this).removeClass('map_sidebar_collapse');
		$(this).addClass('map_search_list');
	}
	return false;
});

$('#toggleMobileMenu').click(function() {
	if ($('#toggleMobileMenu').hasClass('map_menu_toggle_up')) {
		// do close
        $('#sidebar').children().eq(0).addClass('map_mobile_menu_folded');
        $('#categoriesContent').addClass('map_mobile_menu_folded');
        $('#search-content').parent().addClass('map_mobile_menu_folded');
        $('#toggleMobileMenu').removeClass('map_menu_toggle_up');
        $('#toggleMobileMenu').addClass('map_menu_toggle_down');
        $('#toggleMobileMenu').css('outline','none');
		$('#sidebar').parent().addClass('map_mobile_menu_folded');
		$('#categoriesContent').hide();
	} else {
		// do open
		if ($('#search-content').children().length == 0) {
			$('#categoriesContent').show();
			var wmmim = document.getElementById('wmmim');
			if (wmmim != null) {
				wmmim.style.display = 'none';
			}
		}
        $('#sidebar').children().eq(0).removeClass('map_mobile_menu_folded');
        $('#categoriesContent').removeClass('map_mobile_menu_folded');
        $('#search-content').parent().removeClass('map_mobile_menu_folded');
        $('#toggleMobileMenu').removeClass('map_menu_toggle_down');
        $('#toggleMobileMenu').addClass('map_menu_toggle_up');
        $('#toggleMobileMenu').css('outline','');
		$('#sidebar').parent().removeClass('map_mobile_menu_folded');
		$('#search-content').parent().attr('style','');
		if ($('#categoriesContent').css('display') == 'none') {
			$('#search-content').parent().attr('style','display: block;');
		}
	}
	return false;
});

document.getElementById('map-overground').addEventListener('click', showMapA, false);
document.getElementById('map-underground').addEventListener('click', showMapB, false);
document.getElementById('map-shadowoftheerdtree').addEventListener('click', showMapD, false);
function showMapA() {
	$('#mapD',parent.document).hide();
	$('#mapC',parent.document).hide();
	$('#mapB',parent.document).hide();
	$('#mapA',parent.document).show();
	$('#sidebar').parent().removeClass('visible');
	return false;
}
function showMapB() {
	$('#mapD',parent.document).hide();
	$('#mapC',parent.document).hide();
	$('#mapA',parent.document).hide();
	$('#mapB',parent.document).show();
	$('#sidebar').parent().removeClass('visible');
	return false;
}
function showMapD() {
	if (this.tagName.toLowerCase() == 'button') {
		$('#mapA',parent.document).hide();
		$('#mapB',parent.document).hide();
		$('#mapC',parent.document).hide();
		$('#mapD',parent.document).show();
		$('#sidebar').parent().removeClass('visible');
	}
	return false;
}

var delay = (function() {
	var timer = 0;
	return function(callback, ms) {
		clearTimeout (timer);
		timer = setTimeout(callback, ms);
	};
})();

if (isMobile) {
	setTimeout(function() {
		if (params == null || (params.id == null && params.code == null)) {
			if (isNewSearch) {
				var mapSize = map.getSize();
				var pixelX = mapSize.x;
				var pixelY = mapSize.y;
				var pixelPoint = L.point(pixelX, pixelY);
				var latLng = map.containerPointToLatLng(pixelPoint);
				var centerLat = latLng.lat;
				var centerLng = latLng.lng;
				map.setView([centerLat, centerLng], 2);

	}, 1000);

	// collapse menu mobile (when required)
